; ============================================================
;  NETMONITOR — Router SNMP Monitor
;  LilyGo T-Display S3 AMOLED (ESP32-S3) · Arduino · PlatformIO
; ============================================================

[platformio]
default_envs = LILYGO-T-Display-S3-Sqr, LILYGO-T-Display-S3-1-75-Round
src_dir = .

; ---------- Общие настройки для всех окружений ----------
[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=3
build_unflags =
    -std=gnu++11
lib_deps =
    bblanchon/ArduinoJson @ ^7.1.0

; ---------- Шаблон для аппаратных окружений (обе платы) ----------
; MCU/Flash/PSRAM/USB одинаковы у 1.91" и 1.43"/1.75"; различаются
; только пины/драйвер экрана и touch — они выбираются в коде через
; макрос HW_AMOLED_* (см. include/hardware/).
[amoled_base]
board = lilygo-t-display-s3
board_build.filesystem = littlefs
board_build.arduino.memory_type = qio_opi
build_flags =
    ${env.build_flags}
    ; --- USB CDC (вывод Serial по USB-C) ---
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    ; --- External PSRAM (OPI): canvas RGB565 лежит в PSRAM ---
    -DBOARD_HAS_PSRAM
lib_deps =
    ${env.lib_deps}
    ; --- Дисплей AMOLED (RM67162 / CO5300 через Arduino_GFX) ---
    moononournation/GFX Library for Arduino @ 1.4.9
    ; --- Веб-сервер портала настройки ---
    esphome/AsyncTCP-esphome @ ^2.1.4
    esphome/ESPAsyncWebServer-esphome @ ^3.2.2
    ; --- SNMP-менеджер (мы опрашиваем роутер, т.е. выступаем менеджером,
    ;     а НЕ агентом, который отвечает на запросы) ---
    ;     Автор: Martin Rowan (shortbloke). Поддерживает GetRequest и
    ;     счётчики Counter32/Counter64 — то, что нужно для ifIn/OutOctets.
    shortbloke/SNMP Manager @ ^1.1.13
    ; --- ICMP-пинг ---
    marian-craciunescu/ESP32Ping @ ^1.7

; ---------- T-Display S3 AMOLED 1.91" (536x240, RM67162, CST816T) ----------
[env:LILYGO-T-Display-S3-Sqr]
extends = amoled_base
build_flags =
    ${amoled_base.build_flags}
    -DHW_AMOLED_191

; ---------- T-Display S3 AMOLED 1.43"/1.75" (466x466 круг, CO5300, FT3168) ----------
[env:LILYGO-T-Display-S3-1-75-Round]
extends = amoled_base
build_flags =
    ${amoled_base.build_flags}
    -DHW_AMOLED_143

; ---------- Окружение для нативных модульных тестов ----------
; Логику, не зависящую от железа (расчёт скорости, парсинг, FSM),
; можно тестировать на хосте.
[env:native]
platform = native
build_flags =
    -std=gnu++17
lib_deps =
    bblanchon/ArduinoJson @ ^7.1.0
