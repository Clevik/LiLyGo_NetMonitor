; ============================================================
;  NETMONITOR — Router SNMP Monitor
;  LilyGo T-Display S3 AMOLED (ESP32-S3) · Arduino · PlatformIO
; ============================================================

[platformio]
default_envs = lilygo-t-display-s3
src_dir = .

; ---------- Общие настройки для всех окружений ----------
[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=3
build_unflags =
    -std=gnu++11
lib_deps =
    bblanchon/ArduinoJson @ ^7.1.0

; ---------- Основное окружение: прошивка платы ----------
[env:lilygo-t-display-s3]
board = lilygo-t-display-s3
board_build.filesystem = littlefs
board_build.arduino.memory_type = qio_opi
build_flags =
    ${env.build_flags}
    ; --- USB CDC (вывод Serial по USB-C) ---
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    ; --- External PSRAM: the full 536x240 RGB565 canvas is ~257 KB ---
    -DBOARD_HAS_PSRAM
    ; --- Параметры дисплея AMOLED (RM67162, 536x240) ---
    -DLCD_WIDTH=536
    -DLCD_HEIGHT=240
lib_deps =
    ${env.lib_deps}
    ; --- Дисплей AMOLED (RM67162). Подобрать под выбранную библиотеку: ---
    ; Вариант A (официальная LilyGo):  lewisxhe/...
    ; Вариант B (универсальная):       moononournation/GFX Library for Arduino
    moononournation/GFX Library for Arduino @ 1.4.9
    ; --- Веб-сервер портала настройки ---
    esphome/AsyncTCP-esphome @ ^2.1.4
    esphome/ESPAsyncWebServer-esphome @ ^3.2.2
    ; --- SNMP-менеджер (мы опрашиваем роутер, т.е. выступаем менеджером,
    ;     а НЕ агентом, который отвечает на запросы) ---
    ;     Автор: Martin Rowan (shortbloke). Поддерживает GetRequest и
    ;     счётчики Counter32/Counter64 — то, что нужно для ifIn/OutOctets.
    shortbloke/SNMP Manager @ ^1.1.13
    ; --- ICMP-пинг ---
    marian-craciunescu/ESP32Ping @ ^1.7

; ---------- Окружение для нативных модульных тестов ----------
; Логику, не зависящую от железа (расчёт скорости, парсинг, FSM),
; можно тестировать на хосте.
[env:native]
platform = native
build_flags =
    -std=gnu++17
lib_deps =
    bblanchon/ArduinoJson @ ^7.1.0
